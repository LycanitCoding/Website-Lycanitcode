name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: portfolio_db_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: |
          echo "Backend tests would run here"
          # npm test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          # Use /api so nginx proxies to backend on the same origin in production
          REACT_APP_API_URL: /api
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  deploy-production:
    name: Deploy to Production (lycanitcoding.com)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://lycanitcoding.com

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          passphrase: ${{ secrets.PRODUCTION_SSH_PASSPHRASE }}
          envs: JWT_SECRET,DB_PASSWORD,GITHUB_TOKEN
          script: |
            set -e
            cd ~/code/Website-Lycanitcode

            # Write production environment file from GitHub secrets
            echo "JWT_SECRET=${JWT_SECRET}" > .env
            echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
            echo "GITHUB_TOKEN=${GITHUB_TOKEN}" >> .env
            chmod 600 .env

            # Pull latest code
            git pull origin master

            # Build from latest source on the server and restart services
            docker-compose up -d --build --remove-orphans

            # Wait for services to initialise
            echo "Waiting for services to start..."
            sleep 15

            # Show running containers
            docker-compose ps

            # Confirm nginx/health endpoint is responding
            curl -sf http://localhost/health && echo "Health check passed" || echo "Warning: health check did not respond"

      - name: Deployment success
        if: success()
        run: echo "Successfully deployed to https://lycanitcoding.com (3.128.113.14)"

      - name: Deployment failed
        if: failure()
        run: |
          echo "Deployment to production failed — check the SSH step above for details."
          exit 1
