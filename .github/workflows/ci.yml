name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Audit backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high --omit=dev

  docker-integration:
    name: Docker Container Startup Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy SSL certificates for nginx
        run: |
          mkdir -p nginx/ssl
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout nginx/ssl/server.key \
            -out nginx/ssl/server.crt \
            -subj "/CN=localhost"
      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -sf http://localhost:5000/health 2>/dev/null || true)
            if echo "$RESPONSE" | grep -q '"status":"OK"'; then
              echo "Backend is healthy: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i/30: Backend not ready yet, waiting 5s..."
            sleep 5
          done
          echo "ERROR: Backend did not become healthy in time."
          exit 1
      - name: Wait for frontend to be healthy
        run: |
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy (HTTP $STATUS)."
              exit 0
            fi
            echo "Attempt $i/30: Frontend not ready yet (HTTP $STATUS), waiting 5s..."
            sleep 5
          done
          echo "ERROR: Frontend did not become healthy in time."
          exit 1
      - name: Capture Docker container logs
        if: always()
        run: docker compose logs --no-color > /tmp/docker-logs.txt 2>&1

      - name: Upload Docker logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: /tmp/docker-logs.txt

      - name: Clean up containers
        if: always()
        run: docker compose down -v
